name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.90.0
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Verify tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_versions="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].version' | sort -u)"
          test "$package_versions" = "$tag_version"

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Installer
        run: |
          sh -n install.sh scripts/test-install.sh
          scripts/test-install.sh

      - name: Package check
        run: cargo package -p kanterm-core

  build:
    name: Build ${{ matrix.asset_name }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: kanterm-linux-x86_64
          - os: macos-latest
            asset_name: kanterm-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.90.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Build release binaries
        run: cargo build --release -p kanterm -p kanterm-mcp

      - name: Package binaries
        run: |
          mkdir -p "dist/${{ matrix.asset_name }}"
          cp target/release/kanterm "dist/${{ matrix.asset_name }}/"
          cp target/release/kanterm-mcp "dist/${{ matrix.asset_name }}/"
          cp README.md LICENSE "dist/${{ matrix.asset_name }}/"
          tar -C dist -czf "${{ matrix.asset_name }}.tar.gz" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          cp ../install.sh install.sh
          sha256sum *.tar.gz install.sh > SHA256SUMS

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/*.tar.gz dist/install.sh dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
